[Command]
Command="
  copyq:
    var cc = {}
    for (const format of clipboardFormatsToSave()) {
      var data = clipboard(format)
      if (data.length)
        cc[format] = data
    }
    paste_auto(', пожалуйста,', cc)
"
GlobalShortcut=meta+g, meta+п, alt+п, alt+g
HideWindow=true
Icon=
InMenu=true
Input=text/plain
IsGlobalShortcut=true
Name="Paste: \", пожалуйста, \""
Shortcut=meta+п, meta+g
