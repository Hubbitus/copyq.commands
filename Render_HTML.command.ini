[Command]
Command="
  copyq:
    if (!copy())
        abort()
    sleep(200)
    var text = str(clipboard()).trim()
    copy(mimeHtml, text)
    copySelection(mimeHtml, text)
    paste()
"
GlobalShortcut=meta+h
InMenu=true
Input=text/plain
IsGlobalShortcut=true
Match=^\\s*<(!|html)
Name=Render HTML
