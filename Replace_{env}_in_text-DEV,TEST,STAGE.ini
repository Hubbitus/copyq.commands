[Commands]
1\Command="
  copyq:
    var text = copy_auto();
    popup('DEBUG text', text);
    var updated = text.replace(/\\{\\{env\\}\\}/gm,  'stage')
    copy_safe(updated);
    //paste();
"
1\GlobalShortcut=ctrl+alt+s
1\Icon=
1\IsGlobalShortcut=true
1\Match=\\{\\{env\\}\\}
1\Name={{env}} substitution - STAGE
