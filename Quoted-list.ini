[Command]
Command="
  copyq:
    //var text = str(data(mimeText));
    var text = str(clipboard())
    popup('DEBUG text', text)
    var updated = text
      .split(/[\\r\\n]+/)
      // split line content by tab
      .map(line => '('+ line.split('\\t').map(x => `'${x}'`).join(',') + ')')
      .join(',\\n');
    copy(mimeText, updated);
    paste();
"
GlobalShortcut="alt+,"
HideWindow=true
Icon=
InMenu=true
Input=text/plain
IsGlobalShortcut=true
Match=\\t
Name=&Values List
Shortcut="alt+,"
