[Command]
Command="
  copyq:
    var link = str(clipboard()).trim()
    var selected = copy_auto()
    var text = '[' + selected + '|' + link + ']'
    copy_safe(text)
    paste_auto()
"
GlobalShortcut=ctrl+shift+l, ctrl+alt+k
InMenu=true
Input=text/plain
IsGlobalShortcut=true
Match=^\\s*<(!|html)
Name=Jira paste buffer as link
