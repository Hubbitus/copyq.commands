[Command]
Command="
  copyq:
    // https://copyq.readthedocs.io/en/latest/scripting-api.html#functions
    // http://doc.qt.io/qt-5/qdatetime.html#toString
    var dateTime = dateString('yyyy-MM-dd')
    var text = \"h1. Результаты встречи сегодня \" + dateTime
    text += '\\n\\nh2. Присутствовали'
    text += '\\n* [~plalexeev]'
    text += '\\n* '
    text += '\\nh2. Решения и следующие шаги'
    text += '\\n# '
    paste_auto(text)
"
GlobalShortcut=ctrl+alt+m
HideWindow=true
Icon=
Input=text/plain
IsGlobalShortcut=true
Name=Paste meeting notes template
