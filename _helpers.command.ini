[Command]
Command="
  // paste_wayland(text, restoreClipboard):
  // 1) optionally writes text to clipboard/selection,
  // 2) pastes via ydotool Ctrl+V (Wayland-safe),
  // 3) optionally restores previous clipboard content.
  global.paste_wayland = function(text, restoreClipboard) {
    if (text !== undefined) {
      copy(text)
      copySelection(text)
    }
    execute('env', 'YDOTOOL_SOCKET=/tmp/.ydotool_socket', 'ydotool', 'key', '29:1', '47:1', '47:0', '29:0')
    if (restoreClipboard) {
      sleep(200)
      copy(restoreClipboard)
    }
  }

  // paste_auto(text, restoreClipboard):
  // Main universal paste wrapper.
  // Tries native paste() first and falls back to paste_wayland() on failure.
  // Optional restoreClipboard is passed through to fallback path.
  global.paste_auto = function(text, restoreClipboard) {
    if (text !== undefined) {
      copy(text)
      copySelection(text)
    }
    try {
      paste()
    } catch (e) {
      paste_wayland(undefined, restoreClipboard)
    }
  }

  // copy_safe(...args):
  // Safe write helper (former local "copy2" pattern).
  // Writes to clipboard while preserving copy_clipboard config semantics.
  // Use this for programmatic writes when plain copy(...) can affect selection behavior.
  global.copy_safe = function() {
    try {
      var x = config('copy_clipboard')
      config('copy_clipboard', false)
      try {
        copy.apply(this, arguments)
      } finally {
        config('copy_clipboard', x)
      }
    } catch (e) {
      copy.apply(this, arguments)
    }
  }

  // copy_auto():
  // Universal read helper for currently selected text.
  // Tries native copy() first; on Wayland-style failures uses ydotool Ctrl+C fallback.
  // Returns copied plain text or empty string.
  global.copy_auto = function() {
    var text = ''
    try {
      if (copy())
        text = str(clipboard())
    } catch (e) {}
    if (!text) {
      execute('env', 'YDOTOOL_SOCKET=/tmp/.ydotool_socket', 'ydotool', 'key', '29:1', '46:1', '46:0', '29:0')
      sleep(120)
      text = str(clipboard())
    }
    return text
  }
"
IsScript=true
Name=_helpers
