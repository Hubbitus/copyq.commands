[Command]
Command="
  copyq:
    //var text = str(data(mimeText));
    var text = str(clipboard())
    popup('DEBUG text', text)
    var updated = text.split(/[\\r\\n]+/).map(x => `'${x}'`).join(', ');
    copy(mimeText, '(' + updated + ')');
    paste();
"
GlobalShortcut="meta+,", meta+j
HideWindow=true
Icon=
InMenu=true
Input=text/plain
IsGlobalShortcut=true
Match=\\n
Name=Single &Quoted List
Shortcut="meta+,"
