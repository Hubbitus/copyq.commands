[Command]
Automatic=true
Command="
  copyq:
    // By https://copyq.readthedocs.io/en/latest/command-examples.html#linkify
    var link = str(input());
    var href = '<a href=\"###\">###</a>';
    write(
      'text/plain', link,
      'text/html', href.replace(/###/g, link)
    );
"
GlobalShortcut=meta+l
Icon=
Input=text/plain
IsGlobalShortcut=true
Match=^(https?|ftps?|file|mailto)://
Name=Linkify (copy selected on page text as link to this URL)
Remove=true
